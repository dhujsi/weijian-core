<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>运行日志 - 未笺控制台</title>
  <link rel="stylesheet" href="/ui/static/admin.css" />
  <script defer src="/ui/static/admin.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><span class="brand-badge">未笺</span><span>weijian-core</span></div>
      <div class="nav-title">系统页面</div>
      <div class="nav-list">
        <a class="nav-link {% if active_nav == '/ui' %}active{% endif %}" href="/ui">总览</a>
        <a class="nav-link {% if active_nav == '/ui/plugins' %}active{% endif %}" href="/ui/plugins">插件</a>
        <a class="nav-link {% if active_nav == '/ui/settings' %}active{% endif %}" href="/ui/settings">配置</a>
        <a class="nav-link {% if active_nav == '/ui/logs' %}active{% endif %}" href="/ui/logs">日志</a>
      </div>
      <div class="nav-title">插件菜单</div>
      <div class="nav-list">
        {% for m in plugin_menus %}
        <a class="nav-link {% if active_nav == m.route %}active{% endif %}" href="{{ m.route }}">{{ m.title }}</a>
        {% endfor %}
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="top-title">
          <h1>运行日志</h1>
          <p>参考控制台风格：实时查看、历史筛选、清屏（不清空文件）</p>
        </div>
        <div class="token-box">
          <input id="adminTokenInput" type="password" placeholder="管理员令牌" />
          <button id="saveAdminTokenBtn" class="ghost">保存令牌</button>
          <span id="adminTokenStatus" class="muted"></span>
        </div>
      </div>

      <div class="container">
        <div class="card">
          <div class="card-body">
            <div class="toolbar">
              <input id="lines" type="number" min="50" max="2000" value="{{ lines }}" />
              <input id="kw" type="text" placeholder="关键词筛选（可选）" value="{{ kw if kw else '' }}" />
              <select id="levels" multiple title="日志级别筛选（可多选）">
                <option value="DEBUG">DEBUG</option>
                <option value="INFO">INFO</option>
                <option value="WARN">WARN</option>
                <option value="ERROR">ERROR</option>
                <option value="FATAL">FATAL</option>
              </select>
              <button onclick="refreshLogs()">拉取日志</button>
              <button class="ghost" onclick="toggleAutoRefresh()" id="autoBtn">自动刷新：关</button>
              <button class="ghost" onclick="clearFilter()">清空筛选</button>
              <button class="danger" onclick="clearScreen()">清屏</button>
            </div>
            <pre id="logBox" class="log-box">{{ log_text if log_text else '暂无日志（请先触发一次消息或刷新后再看）' }}</pre>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let autoTimer = null;

    window.addEventListener('DOMContentLoaded', () => {
      window.WJAdmin && window.WJAdmin.bindTokenInput();
      hydrateByUrl();
    });

    function selectedLevels() {
      const select = document.getElementById('levels');
      if (!select) return [];
      return Array.from(select.selectedOptions).map(o => o.value);
    }

    function refreshLogsByUrl() {
      const n = Number(document.getElementById('lines').value || 300);
      const kw = (document.getElementById('kw').value || '').trim();
      const query = new URLSearchParams({ lines: String(n) });
      if (kw) query.set('kw', kw);
      const levels = selectedLevels();
      if (levels.length) query.set('levels', levels.join(','));
      location.href = `/ui/logs?${query.toString()}`;
    }

    async function refreshLogs() {
      const n = Number(document.getElementById('lines').value || 300);
      const kw = (document.getElementById('kw').value || '').trim();
      const levels = selectedLevels();
      const query = new URLSearchParams({ lines: String(n) });
      if (kw) query.set('kw', kw);
      if (levels.length) query.set('levels', levels.join(','));

      const res = await fetch(`/admin/logs/query?${query.toString()}`);
      const data = await res.json().catch(() => ({ ok: false, message: `HTTP ${res.status}` }));
      if (!res.ok || !data.ok) {
        alert(`拉取日志失败：${data.message || res.status}`);
        return;
      }
      document.getElementById('logBox').innerText = data.text || '暂无匹配日志';
      history.replaceState(null, '', `/ui/logs?${query.toString()}`);
    }

    function clearFilter() {
      document.getElementById('kw').value = '';
      const select = document.getElementById('levels');
      Array.from(select.options).forEach(o => { o.selected = false; });
      refreshLogs();
    }

    function clearScreen() {
      document.getElementById('logBox').innerText = '（已清屏，仅当前页面显示被清空，日志文件未变更）';
    }

    function toggleAutoRefresh() {
      const btn = document.getElementById('autoBtn');
      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
        btn.innerText = '自动刷新：关';
        return;
      }
      autoTimer = setInterval(refreshLogs, 3000);
      btn.innerText = '自动刷新：开';
      refreshLogs();
    }

    function hydrateByUrl() {
      const params = new URLSearchParams(location.search);
      const levels = (params.get('levels') || '').split(',').map(v => v.trim().toUpperCase()).filter(Boolean);
      if (levels.length) {
        const select = document.getElementById('levels');
        Array.from(select.options).forEach(o => {
          o.selected = levels.includes(o.value);
        });
      }
    }
  </script>
</body>
</html>
