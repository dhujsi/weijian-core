<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>笔记列表 - 微笺控制台</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --line: #e5e7eb;
      --muted: #6b7280;
      --primary: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    h1 { margin: 0; font-size: 24px; }
    .sub { margin: 6px 0 14px; color: var(--muted); font-size: 13px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .nav a {
      text-decoration: none;
      color: #0f172a;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .nav a.active { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
    }
    table { border-collapse: collapse; width: 100%; }
    th, td { border-bottom: 1px solid var(--line); padding: 10px; text-align: left; font-size: 13px; }
    th { background: #f8fafc; color: #374151; }
    tr:hover td { background: #fafafa; }
    .empty { padding: 18px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>笔记列表</h1>
    <div class="sub">展示最近 100 条笔记</div>

    <div class="nav">
      <a class="{% if active_nav == '/ui' %}active{% endif %}" href="/ui">总览</a>
      <a class="{% if active_nav == '/ui/notes' %}active{% endif %}" href="/ui/notes">笔记</a>
      <a class="{% if active_nav == '/ui/reminders' %}active{% endif %}" href="/ui/reminders">提醒</a>
      <a class="{% if active_nav == '/ui/plugins' %}active{% endif %}" href="/ui/plugins">插件</a>
      {% for m in plugin_menus %}
      <a class="{% if active_nav == m.route %}active{% endif %}" href="{{ m.route }}">{{ m.title }}</a>
      {% endfor %}
    </div>

    <div class="card">
      {% if notes|length == 0 %}
      <div class="empty">暂无笔记数据</div>
      {% else %}
      <table>
        <thead>
          <tr><th>ID</th><th>用户</th><th>内容</th><th>创建时间</th></tr>
        </thead>
        <tbody>
          {% for n in notes %}
          <tr>
            <td>{{ n.id }}</td>
            <td>{{ n.user_id }}</td>
            <td>{{ n.content }}</td>
            <td>{{ n.created_at }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      {% endif %}
    </div>
  </div>
</body>
</html>
