<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>笔记列表 - 未笺控制台</title>
  <link rel="stylesheet" href="/ui/static/admin.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><span class="brand-badge">未笺</span><span>weijian-core</span></div>
      <div class="nav-title">系统页面</div>
      <div class="nav-list">
        <a class="nav-link {% if active_nav == '/ui' %}active{% endif %}" href="/ui">总览</a>
        <a class="nav-link {% if active_nav == '/ui/notes' %}active{% endif %}" href="/ui/notes">笔记</a>
        <a class="nav-link {% if active_nav == '/ui/reminders' %}active{% endif %}" href="/ui/reminders">提醒</a>
        <a class="nav-link {% if active_nav == '/ui/plugins' %}active{% endif %}" href="/ui/plugins">插件</a>
        <a class="nav-link {% if active_nav == '/ui/settings' %}active{% endif %}" href="/ui/settings">配置</a>
        <a class="nav-link {% if active_nav == '/ui/logs' %}active{% endif %}" href="/ui/logs">日志</a>
      </div>
      <div class="nav-title">插件菜单</div>
      <div class="nav-list">
        {% for m in plugin_menus %}
        <a class="nav-link {% if active_nav == m.route %}active{% endif %}" href="{{ m.route }}">{{ m.title }}</a>
        {% endfor %}
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="top-title">
          <h1>笔记列表</h1>
          <p>最近 100 条笔记</p>
        </div>
      </div>

      <div class="container">
        <div class="card">
          <div class="card-body">
            {% if notes|length == 0 %}
            <div class="empty">暂无笔记数据</div>
            {% else %}
            <div class="toolbar">
              <input id="kw" type="text" placeholder="按内容/用户筛选（前端）" />
              <button class="ghost" onclick="filterRows()">筛选</button>
              <button class="ghost" onclick="resetRows()">清空筛选</button>
            </div>
            <div class="table-wrap">
              <table id="noteTable">
                <thead>
                  <tr><th>ID</th><th>用户</th><th>内容</th><th>创建时间</th></tr>
                </thead>
                <tbody>
                  {% for n in notes %}
                  <tr>
                    <td>{{ n.id }}</td>
                    <td>{{ n.user_id }}</td>
                    <td>{{ n.content }}</td>
                    <td>{{ n.created_at }}</td>
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
            {% endif %}
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function filterRows() {
      const kw = (document.getElementById('kw')?.value || '').trim().toLowerCase();
      for (const row of document.querySelectorAll('#noteTable tbody tr')) {
        row.style.display = !kw || row.innerText.toLowerCase().includes(kw) ? '' : 'none';
      }
    }
    function resetRows() {
      const input = document.getElementById('kw');
      if (input) input.value = '';
      filterRows();
    }
  </script>
</body>
</html>
