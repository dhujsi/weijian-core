<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>微笺控制台</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success-bg: #ecfdf3;
      --success-text: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    h1 { font-size: 24px; margin: 0; }
    .sub { color: var(--muted); font-size: 13px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 16px; }
    .nav a {
      text-decoration: none;
      color: #0f172a;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .nav a.active { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
    .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
    }
    .card h3 { margin: 0 0 12px; font-size: 16px; }
    .kv { display: grid; gap: 8px; }
    .item { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; }
    .item .k { color: var(--muted); }
    .badge {
      display: inline-block;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--success-bg);
      color: var(--success-text);
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    button {
      border: 0;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: var(--primary-hover); }
    pre {
      margin: 0;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0b1020;
      color: #d1d5db;
      min-height: 88px;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>微笺控制台</h1>
        <div class="sub">weijian-core / WebUI</div>
      </div>
      <span class="badge">运行中</span>
    </div>

    <div class="nav">
      <a class="{% if active_nav == '/ui' %}active{% endif %}" href="/ui">总览</a>
      <a class="{% if active_nav == '/ui/notes' %}active{% endif %}" href="/ui/notes">笔记</a>
      <a class="{% if active_nav == '/ui/reminders' %}active{% endif %}" href="/ui/reminders">提醒</a>
      <a class="{% if active_nav == '/ui/plugins' %}active{% endif %}" href="/ui/plugins">插件</a>
      {% for m in plugin_menus %}
      <a class="{% if active_nav == m.route %}active{% endif %}" href="{{ m.route }}">{{ m.title }}</a>
      {% endfor %}
    </div>

    <div class="grid">
      <div class="card">
        <h3>服务状态</h3>
        <div class="kv">
          <div class="item"><span class="k">服务</span><span>{{ service_status }}</span></div>
          <div class="item"><span class="k">NapCat WS</span><span>{{ ws_host }}:{{ ws_port }}</span></div>
          <div class="item"><span class="k">调度器</span><span>{{ scheduler_running }}</span></div>
          <div class="item"><span class="k">调度错误</span><span>{{ scheduler_error }}</span></div>
          <div class="item"><span class="k">插件数</span><span>{{ plugin_count }}</span></div>
          <div class="item"><span class="k">规则数</span><span>{{ plugin_rule_count }}</span></div>
        </div>
      </div>

      <div class="card">
        <h3>管理操作</h3>
        <div class="actions">
          <button onclick="post('/admin/reload_plugins')">重载全部插件</button>
          <button onclick="post('/admin/reminders/cleanup_done')">清理已完成提醒</button>
        </div>
        <pre id="result">等待操作结果...</pre>
      </div>
    </div>
  </div>

  <script>
    async function post(url) {
      const res = await fetch(url, { method: 'POST' });
      const data = await res.json();
      document.getElementById('result').innerText = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
